<!doctype html>
 <!--declara el tipo de documento. Indica al navegador que usara HTMLS-->
 <html lang="es>"
<!--elemento principal del documento html. 
lag "es" indica que elcontenido esta en "español"-->

   <head> <!--seleccion de configuracion del documento-->
    <meta charset="UTF-8">
    <!--define la codificacion tildes, ñ, simbolos, etc-->
    <meta name="viewport" content="width=device=witdh" , "inicial-scale=1.0">
    <!--hace que el sitio sea responsable. permite que el diseño se adapte correctamente a celulares y tablets-->
    <title>practicando html - img y video</title>
    <meta name "author" content="ashley ramirez">
    <!--indica quien creo el sitio web-->

    <link rel="stylesheet" href="static/css/style.css">
    <!--conexion con hoja CSS de estilos-->

   </head>
   <body>
    <header> <!-- encabezado del documento-->
    <h1>sitio multimedia personal</h1>
    </header>
    <hr> <!--crea una linea de division-->
    <main> <!-- seccion principal del documento--> 
        <h2>MLS datos:</h2>
        <p>nombre: ashley ramirez<br> <!--br es un salto de linea--> 
        curso: 3C
    </p>
    <hr> 
    <h2>galeria multimedia</h2>
    <p>imagen de ejemplo</p>
    <img src="static/images/imagen1.png" alt="imagen1" with="300">
    <img src="static/images/imagen2.png" alt="imagen2" with="300">
    <img src="static/images/imagen3.png" alt="imagen3" with="300">
    <hr>
    <h2>videos</h2>
    <video width="688" controls>
        <source src="static/videos/video1.mp4" type="video/mp4">
    </video>
    </main>
    <footer>
        <p style="text-align:center">todos los derechos reservados
        <a> href="http://es.wikipedia.org/wiki/gatos">mas informacion</a> <!--estiqueta <a> para vinculos-->
        </p> 
    </footer>
   </body>
   </html>
